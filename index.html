<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slug Generator - SEO Friendly & Punchy</title

                                                     <!-- Legacy/Root Fallback -->
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

<!-- Modern PNGs -->
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/images/favicon-48x48.png">

<!-- iOS/Safari -->
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

<!-- PWA & Android -->
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#00000">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains+Mono', monospace;
        }
        .slug-output {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-12 px-4">

    <div class="max-w-3xl mx-auto space-y-8">
        <!-- Header -->
        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center p-3 bg-indigo-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Slug Generator</h1>
            <p class="text-slate-500 text-lg italic">"Making links punchy by removing unnecessary words."</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-6 sm:p-8 space-y-6">
                <!-- Input Area -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-sm font-semibold text-slate-700">Input Text</label>
                        <button id="clearBtn" class="text-xs text-slate-400 hover:text-red-500 flex items-center gap-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            Clear
                        </button>
                    </div>
                    <textarea
                        id="inputText"
                        placeholder="Example: The Quick Brown Fox jumps over the Lazy Dog"
                        class="w-full h-28 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-800 resize-none"
                    ></textarea>
                </div>

                <!-- Options -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Separator</label>
                        <div class="flex gap-2" id="separatorGroup">
                            <button data-sep="-" class="sep-btn flex-1 py-2 rounded-lg text-sm font-medium border bg-indigo-600 text-white border-indigo-600 shadow-sm transition-all">-</button>
                            <button data-sep="_" class="sep-btn flex-1 py-2 rounded-lg text-sm font-medium border bg-white text-slate-600 border-slate-200 hover:border-indigo-300 transition-all">_</button>
                            <button data-sep="." class="sep-btn flex-1 py-2 rounded-lg text-sm font-medium border bg-white text-slate-600 border-slate-200 hover:border-indigo-300 transition-all">.</button>
                            <button data-sep="" class="sep-btn flex-1 py-2 rounded-lg text-sm font-medium border bg-white text-slate-600 border-slate-200 hover:border-indigo-300 transition-all">None</button>
                        </div>
                    </div>

                    <div class="flex flex-col justify-center space-y-3 px-2">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="removeStopWords" checked class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                            <span class="text-sm text-slate-600 group-hover:text-indigo-600 font-medium transition-colors">
                                Remove Stop Words (a, the, is, etc.)
                            </span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="forceLowercase" checked class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                            <span class="text-sm text-slate-600 group-hover:text-indigo-600 font-medium transition-colors">
                                Force Lowercase
                            </span>
                        </label>
                    </div>
                </div>

                <!-- Output Area -->
                <div class="space-y-3">
                    <label class="text-sm font-semibold text-slate-700">Punchy Slug</label>
                    <div class="relative">
                        <div id="slugOutput" class="w-full p-4 pr-12 min-h-[3.5rem] flex items-center bg-indigo-50 border-2 border-indigo-100 rounded-xl text-indigo-900 font-mono break-all slug-output italic text-slate-400">
                            Start typing to generate a link...
                        </div>
                        <button
                            id="copyBtn"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-2 bg-white text-indigo-600 rounded-lg shadow-sm border border-indigo-100 hover:bg-indigo-600 hover:text-white transition-all hidden"
                            title="Copy to clipboard"
                        >
                            <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            <svg id="checkIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 flex justify-between items-center text-xs text-slate-400 font-medium">
                <span class="flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    SEO Optimized
                </span>
                <span id="charCount">Length: 0</span>
            </div>
        </div>

        <!-- History Area -->
        <div id="historySection" class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden hidden">
            <div class="px-6 py-4 border-b border-slate-50 flex items-center gap-2 text-slate-800 font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"></path><circle cx="12" cy="12" r="9"></circle></svg>
                Recent Punchy Slugs
            </div>
            <div id="historyList" class="divide-y divide-slate-50">
                <!-- History items injected here -->
            </div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const slugOutput = document.getElementById('slugOutput');
        const copyBtn = document.getElementById('copyBtn');
        const charCount = document.getElementById('charCount');
        const removeStopWords = document.getElementById('removeStopWords');
        const forceLowercase = document.getElementById('forceLowercase');
        const clearBtn = document.getElementById('clearBtn');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');
        const copyIcon = document.getElementById('copyIcon');
        const checkIcon = document.getElementById('checkIcon');

        let currentSeparator = '-';
        let history = [];

        const stopWords = new Set([
            'a', 'an', 'the', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'with', 
            'is', 'of', 'are', 'was', 'were', 'by', 'from', 'up', 'about', 'into', 'over', 'after'
        ]);

        function generateSlug() {
            const text = inputText.value;
            if (!text) {
                slugOutput.textContent = 'Start typing to generate a link...';
                slugOutput.classList.add('italic', 'text-slate-400');
                copyBtn.classList.add('hidden');
                charCount.textContent = 'Length: 0';
                return '';
            }

            let processed = text;
            
            // 1. Remove special characters to isolate words
            processed = processed.replace(/[^\w\s-]/g, ' ');

            // 2. Handle Case
            if (forceLowercase.checked) {
                processed = processed.toLowerCase();
            }

            // 3. Split into words
            let words = processed.split(/\s+/).filter(Boolean);

            // 4. Filter Stop Words
            if (removeStopWords.checked) {
                words = words.filter(word => !stopWords.has(word.toLowerCase()));
            }

            // 5. Join and clean up
            let result = words.join(currentSeparator);
            if (currentSeparator) {
                const escapedSep = currentSeparator.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`${escapedSep}+`, 'g');
                result = result.replace(regex, currentSeparator);
            }

            slugOutput.textContent = result;
            slugOutput.classList.remove('italic', 'text-slate-400');
            copyBtn.classList.remove('hidden');
            charCount.textContent = `Length: ${result.length}`;
            return result;
        }

        function copyToClipboard(text, isMain = false) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            if (isMain) {
                copyIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                addToHistory(text, inputText.value);
                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                }, 2000);
            }
        }

        function addToHistory(slug, original) {
            if (!slug || history.some(item => item.slug === slug)) return;
            
            const newItem = { id: Date.now(), slug, original };
            history = [newItem, ...history].slice(0, 10);
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historySection.classList.add('hidden');
                return;
            }
            historySection.classList.remove('hidden');
            historyList.innerHTML = history.map(item => `
                <div class="p-4 hover:bg-indigo-50/30 flex items-center justify-between group transition-colors">
                    <div class="flex-1 min-w-0 pr-4 text-left">
                        <p class="text-xs text-slate-400 truncate mb-0.5">${item.original}</p>
                        <p class="text-sm font-mono text-indigo-600 truncate">${item.slug}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="copyToClipboard('${item.slug}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-white rounded-lg border border-transparent hover:border-indigo-100 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <button onclick="deleteHistoryItem(${item.id})" class="p-2 text-slate-400 hover:text-red-500 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteHistoryItem(id) {
            history = history.filter(item => item.id !== id);
            renderHistory();
        }

        // Event Listeners
        inputText.addEventListener('input', generateSlug);
        removeStopWords.addEventListener('change', generateSlug);
        forceLowercase.addEventListener('change', generateSlug);
        
        document.querySelectorAll('.sep-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sep-btn').forEach(b => {
                    b.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-sm');
                    b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                });
                btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-sm');
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                currentSeparator = btn.getAttribute('data-sep');
                generateSlug();
            });
        });

        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            generateSlug();
        });

        copyBtn.addEventListener('click', () => {
            copyToClipboard(slugOutput.textContent, true);
        });
    </script>
</body>
</html>
